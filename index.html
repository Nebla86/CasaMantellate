<style>
:root{--font:'Outfit',sans-serif;--bg:#f7f6f3;--surface:#fff;--border:rgba(0,0,0,.09);--bmed:rgba(0,0,0,.15);--t:#1a1a18;--t2:#6b6b67;--t3:#a8a8a4;--cacq:#2d6a2d;--bgacq:#eaf3e8;--cord:#0f6e56;--bgord:#e1f5ee;--csel:#1a5296;--bgsel:#e6f0fb;--ccor:#b35a1a;--bgcor:#faecd8;--cdec:#c44a2a;--bgdec:#faeae7;--cdsc:#666660;--bgdsc:#f1f0ec;--cess:#9b2424;--bgess:#fbeaea;--cimp:#7a4a0a;--bgimp:#faeada}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--t);font-size:14px;line-height:1.5}
.app{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
header{margin-bottom:1.5rem}
header h1{font-size:24px;font-weight:600;letter-spacing:-.02em}
header p{font-size:13px;color:var(--t2);margin-top:3px}
/* WEEK TABS */
.wtab{background:none;border:.5px solid var(--bmed);border-radius:20px;padding:5px 12px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.wtab:hover{color:var(--t);border-color:var(--t)}
.wtab.active{background:var(--t);color:var(--surface);border-color:var(--t)}
.wcnt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.25);color:inherit}
.wtab:not(.active) .wcnt{background:var(--bgdec);color:var(--cdec)}
.wtab.active .wcnt{background:rgba(255,255,255,.2);color:#fff}
.wbox{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:1.5rem}
.wbox h3{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.wcols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.wcols{grid-template-columns:1fr}}
.wct{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px}
.arow{display:flex;gap:10px;align-items:flex-start;padding:5px 0;border-bottom:.5px solid var(--border)}
.arow:last-child{border-bottom:none}
.adate{font-size:11px;font-weight:600;color:var(--csel);min-width:90px;padding-top:1px}
.atitle{font-size:12px}
.brow{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:.5px solid var(--border)}
.brow:last-child{border-bottom:none}
.bbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--bgdec);color:var(--cdec);white-space:nowrap;flex-shrink:0}
.bnote{font-size:11px;color:var(--t3);display:block}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.5rem}
.metric{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:12px 14px}
.mlabel{font-size:11px;color:var(--t2);margin-bottom:4px}
.mval{font-size:22px;font-weight:600}
/* NAV */
nav{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.75rem;flex-wrap:wrap}
nav button{background:none;border:none;border-bottom:2px solid transparent;padding:9px 14px;font-family:var(--font);font-size:13px;color:var(--t2);cursor:pointer;margin-bottom:-1px;transition:color .15s}
nav button:hover{color:var(--t)}
nav button.active{border-bottom-color:var(--t);font-weight:500;color:var(--t)}
/* COMMON */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sub{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:8px 0 5px}
/* TILES */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.tile{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:16px}
.thead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tname{font-size:15px;font-weight:500;flex:1}
.tpbar{height:3px;background:var(--border);border-radius:2px;margin-bottom:10px}
.tpfill{height:3px;border-radius:2px}
.tstat{display:flex;justify-content:space-between;margin-bottom:10px}
.tstat span{font-size:11px;color:var(--t2)}
.titem{display:flex;align-items:flex-start;gap:7px;font-size:12px;margin-bottom:4px}
.tmore{font-size:11px;color:var(--t3);margin-top:4px;padding-left:14px}
/* ROOM DETAIL */
.rcard{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.rhead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rname{font-size:14px;font-weight:500;flex:1}
.rpbar{height:3px;background:var(--border);border-radius:2px;width:70px}
.irow{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border)}
.irow:last-child{border-bottom:none}
.itext{flex:1;min-width:0;font-size:12px}
.inote{font-size:11px;color:var(--t3);margin-left:4px}
.iblock{font-size:10px;font-weight:600;color:var(--cdec);background:var(--bgdec);padding:1px 6px;border-radius:10px;white-space:nowrap}
/* ORDINA */
.oroom{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:16px 0 6px}
.orow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface);border:.5px solid var(--border);margin-bottom:5px}
.oname{flex:1;font-size:13px}
/* TIMELINE */
.tlcath{display:flex;align-items:center;gap:7px;margin:14px 0 5px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t2)}
.tlrow{display:flex;align-items:flex-start;margin-bottom:3px}
.tllbl{text-align:right;padding-right:10px;padding-top:4px;font-size:11px;color:var(--t2);line-height:1.3;flex-shrink:0}
.tltrack{flex:1;position:relative}
.tlbar{position:absolute;top:3px;height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden}
.tlnote{position:absolute;top:27px;font-size:10px;color:var(--t3);white-space:nowrap}
.tlgrid{position:absolute;top:0;bottom:0;width:.5px;background:var(--border)}
.tltoday{position:absolute;top:0;bottom:0;width:2px;background:#c44a2a;opacity:.5}
.tlwrow{display:flex;margin-bottom:4px}
/* LISTA */
.lfilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.lfilters select{font-family:var(--font);font-size:12px;padding:6px 10px;border:.5px solid var(--bmed);border-radius:8px;background:var(--surface);color:var(--t);cursor:pointer}
.lrow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px}
.lrow:nth-child(odd){background:var(--surface)}
.larea{font-size:11px;color:var(--t3);white-space:nowrap}
/* LOG */
.logentry{display:flex;gap:14px;padding:10px 0;border-bottom:.5px solid var(--border);align-items:flex-start}
.logentry:last-child{border-bottom:none}
.logdate{font-size:11px;font-weight:600;color:var(--t2);min-width:85px;padding-top:1px}
.logtext{font-size:13px}
.logform{margin-top:1.25rem;display:flex;gap:8px;flex-wrap:wrap}
.logform input{flex:1;min-width:200px;font-family:var(--font);font-size:13px;padding:8px 12px;border:.5px solid var(--bmed);border-radius:8px;background:var(--surface);color:var(--t)}
.logform button{font-family:var(--font);font-size:13px;padding:8px 16px;border:none;border-radius:8px;background:var(--t);color:var(--surface);cursor:pointer}
</style>
</head>

<div class="app">

<header>
  <h1>Casa Mantellate</h1>
  <p>Cantiere in corso · aggiornato <span id="meta-date"></span></p>

<div class="wbox">

    <button class="wtab" onclick="switchWeekTab('blocks',this)">Urgenti <span id="wcount-blocks" class="wcnt"></span></button>
  </div>
  <div id="week-appts"></div>
  <div id="week-blocks" style="display:none"></div>
</div>

<div class="metrics" id="metrics"></div>

<nav>
  <button class="active" onclick="showTab('tiles',this)">Panoramica</button>
  <button onclick="showTab('stanze',this)">Per stanza</button>
  <button onclick="showTab('timeline',this)">Timeline</button>
  <button onclick="showTab('ordina',this)">Da ordinare</button>
  <button onclick="showTab('lista',this)">Lista voci</button>
  <button onclick="showTab('log',this)">Log</button>
</nav>

<div id="tab-tiles"></div>
<div id="tab-stanze" style="display:none"></div>
<div id="tab-timeline" style="display:none"></div>
<div id="tab-ordina" style="display:none"></div>

        {label:"Sanitari + docce",s:20,d:5,note:"Dopo parquet"},
        {label:"Porte normali",s:30,d:4,note:"Dopo tinteggiatura"},
        {label:"Scaldatore + ventola lavanderia",s:32,d:3,note:"WARM WALL + ventola rack"},
        {label:"Porte vetro",s:35,d:5,note:"Cucina + cabina armadio"},
        {label:"Mobili bagno",s:35,d:4,note:"Metà giugno"},
        {label:"Zanzariere Cobola ×9",s:35,d:4,note:"Da metà giugno"},
        {label:"Scala retrattile sottotetto",s:40,d:2,note:"~20 giugno"},
      ]},
      {label:"Mobili + arredi",color:"#1D9E75",textColor:"#04342C",phases:[
        {label:"Installazione mobili",s:46,d:6,note:"Ultima settimana giugno"},
      ]},
    ]
  }
};

const SC={
  acquistato:    {label:"Acquistato",   c:"var(--cacq)", bg:"var(--bgacq)"},
  ordinato:      {label:"Ordinato",     c:"var(--cord)", bg:"var(--bgord)"},
  scelto:        {label:"Scelto",       c:"var(--csel)", bg:"var(--bgsel)"},
  "in-corso":    {label:"In corso",     c:"var(--ccor)", bg:"var(--bgcor)"},
  "da-decidere": {label:"Da decidere",  c:"var(--cdec)", bg:"var(--bgdec)"},
  "da-scegliere":{label:"Da scegliere", c:"var(--cdsc)", bg:"var(--bgdsc)"},
};
const PC={
  essenziale:{label:"Essenziale",c:"var(--cess)",bg:"var(--bgess)"},
  importante:{label:"Importante",c:"var(--cimp)",bg:"var(--bgimp)"},
};
const PRIO=["essenziale","importante","procrastinabile"];

function badge(l,c,bg){return `<span class="badge" style="color:${c};background:${bg}">${l}</span>`;}
function sBadge(s){const c=SC[s]||SC["da-scegliere"];return badge(c.label,c.c,c.bg);}
function pBadge(p){const c=PC[p];return c?badge(c.label,c.c,c.bg):"";}
function sDot(s,mt){const c=SC[s]||SC["da-scegliere"];return `<span class="dot" style="background:${c.c};margin-top:${mt==null?5:mt}px"></span>`;}
function prog(r){
  const tot=r.items.length;
  const done=r.items.filter(i=>["acquistato","ordinato"].includes(i.s)).length;
  const adv=r.items.filter(i=>["scelto","in-corso"].includes(i.s)).length;
  return{tot,done,adv,pct:Math.round((done+adv*.5)/tot*100)};
}

function parseApptDate(when){
  const mo={gen:0,feb:1,mar:2,apr:3,mag:4,giu:5,lug:6,ago:7,set:8,ott:9,nov:10,dic:11};
  const p=when.split(' ');
  const time=(p[4]||"00:00").split(':');
  return new Date(2026,mo[p[2]],parseInt(p[1]),parseInt(time[0]),parseInt(time[1]));
}
function switchWeekTab(id,btn){
  document.getElementById("week-appts").style.display=id==="appts"?"block":"none";
  document.getElementById("week-blocks").style.display=id==="blocks"?"block":"none";
  document.querySelectorAll(".wtab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
function renderWeek(){
  document.getElementById("meta-date").textContent=DATA.meta.lastUpdate;
  const now=new Date();
  const future=DATA.meta.appointments.filter(a=>parseApptDate(a.when)>now);
  document.getElementById("wcount-appts").textContent=future.length;
  document.getElementById("week-appts").innerHTML=future.length
    ?future.map(a=>`<div class="arow"><span class="adate">${a.when}</span><span class="atitle">${a.title}</span></div>`).join("")
    :`<div style="font-size:12px;color:var(--t3);padding:6px 0">Nessun appuntamento in programma</div>`;
  const blocks=DATA.rooms.flatMap(r=>r.items.filter(i=>i.blockBy).map(i=>({...i,room:r.name})));
  document.getElementById("wcount-blocks").textContent=blocks.length;
  document.getElementById("week-blocks").innerHTML=blocks.length
    ?blocks.map(i=>`<div class="brow"><span class="bbadge">${i.blockBy}</span><div><span style="font-size:12px">${i.n}</span><span class="bnote">${i.room}${i.blockNote?" · "+i.blockNote:""}</span></div></div>`).join("")
    :`<div style="font-size:12px;color:var(--t3);padding:6px 0">Nessuna urgenza</div>`;
}

function renderMetrics(){
  const all=DATA.rooms.flatMap(r=>r.items);
  const acq=all.filter(i=>["acquistato","ordinato"].includes(i.s)).length;
  const ess=DATA.rooms.filter(r=>r.priority==="essenziale").flatMap(r=>r.items);
  const essOk=ess.filter(i=>["acquistato","ordinato","scelto","in-corso"].includes(i.s)).length;
  const toOrd=all.filter(i=>i.s==="scelto").length;
  const urgent=all.filter(i=>i.blockBy).length;
  [
    {label:"Acquistati/ordinati",val:acq,c:"#2d6a2d"},
    {label:"Essenziali avanzate",val:`${essOk}/${ess.length}`,c:"#b35a1a"},
    {label:"Da ordinare ora",val:toOrd,c:"#1a5296"},
    {label:"Decisioni urgenti",val:urgent,c:"#c44a2a"},
  ].forEach((m,i)=>document.getElementById("metrics").children[i] && (
    document.getElementById("metrics").children[i].innerHTML=`<div class="mlabel">${m.label}</div><div class="mval" style="color:${m.c}">${m.val}</div>`
  ));
  document.getElementById("metrics").innerHTML=[
    {label:"Acquistati/ordinati",val:acq,c:"#2d6a2d"},
    {label:"Essenziali avanzate",val:`${essOk}/${ess.length}`,c:"#b35a1a"},
    {label:"Da ordinare ora",val:toOrd,c:"#1a5296"},
    {label:"Decisioni urgenti",val:urgent,c:"#c44a2a"},
  ].map(m=>`<div class="metric"><div class="mlabel">${m.label}</div><div class="mval" style="color:${m.c}">${m.val}</div></div>`).join("");
}

function renderTiles(){
  const sorted=[...DATA.rooms].sort((a,b)=>PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority));
  let h=`<div class="tgrid">`;
  sorted.forEach(r=>{
    const p=prog(r);
    const pc=PC[r.priority];
    const bord=pc?{essenziale:"#9b2424",importante:"#7a4a0a"}[r.priority]||"#ccc":"#e0dfd8";
    const done=r.items.filter(i=>["acquistato","ordinato"].includes(i.s));
    const inP=r.items.filter(i=>["scelto","in-corso","da-decidere"].includes(i.s));
    const pend=r.items.filter(i=>i.s==="da-scegliere");
    const blocking=r.items.filter(i=>i.blockBy);
    const fill=p.done===p.tot?"#2d6a2d":"#1a5296";
    h+=`<div class="tile" style="border-top:3px solid ${bord}">
      <div class="thead"><span class="tname">${r.name}</span>${pBadge(r.priority)}</div>
      <div class="tpbar"><div class="tpfill" style="width:${p.pct}%;background:${fill}"></div></div>
      <div class="tstat"><span>${done.length} ok · ${inP.length} in corso</span><span>${pend.length} da scegliere</span></div>`;
    if(inP.length||pend.length){
      h+=`<div class="sub">Acquisti</div>`;
      [...inP,...pend].forEach(i=>{
        const tag=i.blockBy?`<span style="font-size:9px;font-weight:600;padding:1px 6px;border-radius:10px;background:#c44a2a;color:#fff;white-space:nowrap;flex-shrink:0">urgente</span>`:"";
        h+=`<div class="titem">${sDot(i.s)}<span style="flex:1">${i.n}</span>${tag}</div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById("tab-tiles").innerHTML=h;
}

function renderStanze(){
  const sorted=[...DATA.rooms].sort((a,b)=>PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority));
  let h="";
  sorted.forEach(r=>{
    const p=prog(r);
    const fill=p.done===p.tot?"#2d6a2d":"#1a5296";
    h+=`<div class="rcard">
      <div class="rhead"><span class="rname">${r.name}</span>${pBadge(r.priority)}<span style="font-size:11px;color:var(--t2)">${p.done}/${p.tot}</span><div class="rpbar"><div style="height:3px;border-radius:2px;width:${p.pct}%;background:${fill}"></div></div></div>`;
    if(r.lavori&&r.lavori.length){
      h+=`<div class="sub">Lavori impresa</div>`;
      r.lavori.forEach(l=>h+=`<div style="display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px;color:var(--t2)"><span class="dot" style="background:#639922"></span>${l}</div>`);
    }
    h+=`<div class="sub" style="margin-top:8px">Acquisti / forniture</div>`;
    r.items.forEach(i=>h+=`<div class="irow">${sDot(i.s)}<span class="itext">${i.n}${i.note?`<span class="inote">${i.note}</span>`:""}</span>${i.blockBy?`<span class="iblock">${i.blockBy}</span>`:""}${sBadge(i.s)}</div>`);
    h+=`</div>`;
  });
  document.getElementById("tab-stanze").innerHTML=h;
}

function renderOrdina(){
  const byRoom=DATA.rooms.map(r=>({name:r.name,items:r.items.filter(i=>i.s==="scelto")})).filter(r=>r.items.length);
  const tot=byRoom.reduce((s,r)=>s+r.items.length,0);
  let h=`<p style="font-size:13px;color:var(--t2);margin-bottom:1.25rem">Tutto quello che è già scelto e attende solo di essere ordinato — <strong style="color:var(--t)">${tot} voci</strong>.</p>`;
  byRoom.forEach(r=>{
    h+=`<div class="oroom">${r.name}</div>`;
    r.items.forEach(i=>h+=`<div class="orow">${sDot("scelto",0)}<span class="oname">${i.n}${i.note?` <span style="font-size:11px;color:var(--t3)">(${i.note})</span>`:""}</span>${i.blockBy?`<span class="iblock">${i.blockBy}</span>`:""}<span class="badge" style="color:var(--csel);background:var(--bgsel)">Scelto</span></div>`);
  });
  document.getElementById("tab-ordina").innerHTML=h;
}

function renderTimeline(){
  const T=DATA.timeline.totalDays,LW=175;
  const tS=new Date(2026,4,11);
  function dAt(n){const d=new Date(tS);d.setDate(d.getDate()+n);return `${d.getDate()}/${d.getMonth()+1}`;}
  let h=`<p style="font-size:12px;color:var(--t2);margin-bottom:.75rem">Avvio: 11 maggio 2026 · Installazione mobili: fine giugno</p>`;
  h+=`<div class="tlwrow" style="margin-left:${LW}px">`;
  for(let w=0;w*7<=T;w++) h+=`<div style="flex:7;font-size:10px;color:var(--t3)">${dAt(w*7)}</div>`;
  h+=`</div>`;
  DATA.timeline.categories.forEach(cat=>{
    h+=`<div class="tlcath" style="margin-left:${LW}px"><span style="width:8px;height:8px;border-radius:2px;background:${cat.color};flex-shrink:0"></span>${cat.label}</div>`;
    cat.phases.forEach(p=>{
      const bc=p.dim?"#D3D1C7":cat.color,tc=p.dim?"#888":cat.textColor;
      const ph=p.note?42:28;
      const grids=Array.from({length:10},(_,w)=>w*7<=T?`<div class="tlgrid" style="left:${(w*7/T*100).toFixed(1)}%"></div>`:"").join("");
      h+=`<div class="tlrow"><div class="tllbl" style="width:${LW}px;min-width:${LW}px">${p.label}</div><div class="tltrack" style="height:${ph}px">${grids}<div class="tltoday" style="left:0"></div><div class="tlbar" style="left:${(p.s/T*100).toFixed(1)}%;width:${(p.d/T*100).toFixed(1)}%;background:${bc};color:${tc}">${p.d}g</div>${p.note?`<div class="tlnote" style="left:${(p.s/T*100).toFixed(1)}%">${p.note}</div>`:""}</div></div>`;
    });
  });
  h+=`<div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--t2)">`;
  DATA.timeline.categories.forEach(c=>h+=`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${c.color}"></span>${c.label}</span>`);
  h+=`</div>`;
  document.getElementById("tab-timeline").innerHTML=h;
}

let lf={area:"Tutte",stato:"Tutti"};
const allItems=DATA.rooms.flatMap(r=>r.items.map(i=>({...i,area:r.name})));
function renderLista(){
  const areas=["Tutte",...new Set(allItems.map(i=>i.area))];
  const stati=["Tutti",...Object.keys(SC)];
  const filt=allItems.filter(i=>(lf.area==="Tutte"||i.area===lf.area)&&(lf.stato==="Tutti"||i.s===lf.stato));
  let h=`<div class="lfilters"><select onchange="lf.area=this.value;renderLista()">${areas.map(a=>`<option${a===lf.area?" selected":""}>${a}</option>`).join("")}</select><select onchange="lf.stato=this.value;renderLista()">${stati.map(s=>`<option value="${s}"${s===lf.stato?" selected":""}>${s==="Tutti"?"Tutti gli stati":SC[s]?.label||s}</option>`).join("")}</select><span style="font-size:12px;color:var(--t2)">${filt.length} voci</span></div>`;
  filt.forEach(i=>h+=`<div class="lrow">${sDot(i.s)}<span style="flex:1;font-size:12px">${i.n}${i.note?` <span style="color:var(--t3);font-size:11px">(${i.note})</span>`:""}</span><span class="larea">${i.area}</span>${i.blockBy?`<span class="iblock">${i.blockBy}</span>`:""}${sBadge(i.s)}</div>`);
  document.getElementById("tab-lista").innerHTML=h;
}

function renderLog(){
  let h=`<div style="margin-bottom:1.25rem">`;
  [...DATA.log].reverse().forEach(e=>h+=`<div class="logentry"><span class="logdate">${e.date}</span><span class="logtext">${e.text}</span></div>`);
  h+=`</div><div class="logform"><input id="log-input" type="text" placeholder="Aggiungi un aggiornamento..."><button onclick="addLog()">Aggiungi</button></div><p style="font-size:11px;color:var(--t3);margin-top:8px">Le voci aggiunte qui sono temporanee — per salvarle in modo permanente aggiorna DATA.log con Claude.</p>`;
  document.getElementById("tab-log").innerHTML=h;
}
function addLog(){
  const inp=document.getElementById("log-input");
  if(!inp||!inp.value.trim())return;
  const d=new Date();
  DATA.log.push({date:`${d.getDate()} ${["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"][d.getMonth()]} ${d.getFullYear()}`,text:inp.value.trim()});
  renderLog();
}

function showTab(id,btn){
  ["tiles","stanze","timeline","ordina","lista","log"].forEach(t=>document.getElementById("tab-"+t).style.display=t===id?"block":"none");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

renderWeek();renderMetrics();renderTiles();renderStanze();renderTimeline();renderOrdina();renderLista();renderLog();
</script>
</body>
</html>

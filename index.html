<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Mantellate</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<!--
╔══════════════════════════════════════════════════════════════════════╗
║  NOTE PER CLAUDE — ISTRUZIONI PER AGGIORNARE QUESTO FILE            ║
╠══════════════════════════════════════════════════════════════════════╣
║  PROGETTO: Ristrutturazione Casa Mantellate, Torino                  ║
║  120 mq. Senza gas. Riscaldamento a pavimento. Canalizzata.          ║
║                                                                      ║
║  DATA.rooms     → stanze con lavori + items                          ║
║  DATA.timeline  → Gantt (giorno 0 = 11 mag 2026)                    ║
║  DATA.meta      → appuntamenti, data aggiornamento                   ║
║  DATA.nextStops → fermate mini-timeline in alto                      ║
║  DATA.log       → storico [{date, text}]                             ║
║                                                                      ║
║  item.s: acquistato|ordinato|scelto|in-corso|da-decidere|da-scegliere║
║  item.blockBy   → scadenza urgente (stringa)                         ║
║  item.blockNote → spiegazione vincolo                                ║
║  room.priority: essenziale|importante|procrastinabile                ║
║                                                                      ║
║  TEMA: Warm Glass — oklch() + backdrop-filter + mesh gradient        ║
║  Font: Geist (body) + Geist Mono + Instrument Serif (display)        ║
║  Per aggiornare i colori: modificare le custom properties in :root   ║
║                                                                      ║
║  ULTIMO AGGIORNAMENTO: 14 giugno 2026 (v7)                           ║
║                                                                      ║
║  STATO CANTIERE:                                                      ║
║  ACQUISTATI/ORDINATI: elettrodomestici ×6, tappezzeria camera,       ║
║    boiserie Henry Giraudo ovunque, impianto PierH2O, rubinetto,      ║
║    mobile disimpegno, letto+materasso, mobile lavanderia,            ║
║    tavolo cucina, tavolo sala, sedie cucina ×6,                      ║
║    mobile antibagno cabina, lavabi+mobili bagni ×2, specchiere ×2.  ║
║  PORTE INTERNE: consegna ~23 giu, installazione 8-10 lug.            ║
║  CUCINA: consegna 15 lug, posa 22 lug, posa top cucina 6 ago.        ║
║  TIMELINE: piastrellature finiscono 3 giu, elettricista fine 10 giu, ║
║    rasatura 12 giu, scala mansarda 18 giu, parquet 21-24 giu,        ║
║    decoratore+tinteggiatura 29 giu–3 lug, porte 8-10 lug,           ║
║    cucina 15+22 lug, posa top cucina 6 ago.                          ║
║                                                                      ║
║  GIORNI CHIAVE (day 0 = 11 mag 2026):                                ║
║  23=3giu · 30=10giu · 32=12giu · 38=18giu · 41=21giu · 43=23giu    ║
║  45=25giu · 49=29giu · 58=8lug · 65=15lug · 72=22lug · 87=6ago     ║
╚══════════════════════════════════════════════════════════════════════╝

<style>
@property --prog-pct {
  syntax: '<percentage>';
  inherits: false;
  initial-value: 0%;
}

:root {
  --font:         'Geist', system-ui, sans-serif;
  --font-display: 'Instrument Serif', Georgia, serif;
  --mono:         'Geist Mono', monospace;

  --surface:  oklch(100% 0 0 / .62);
  --surface2: oklch(100% 0 0 / .38);
  --border:   oklch(100% 0 0 / .52);
  --border2:  oklch(40% .02 68 / .18);
  --blur:     16px;

  --t:  oklch(20% .022 58);
  --t2: oklch(44% .018 58);
  --t3: oklch(66% .012 58);

  --r: 14px;
  --card-shadow:
    0 8px 32px oklch(20% .05 60 / .07),
    0 2px 8px  oklch(20% .05 60 / .05),
    inset 0 1px 0 oklch(100% 0 0 / .55);

  --accent:    oklch(50% .19 28);
  --accent-bg: oklch(50% .19 28 / .1);
  --accent-t:  oklch(30% .16 28);

  --cacq: oklch(30% .12 150); --bgacq: oklch(88% .09 150);
  --cord: oklch(27% .10 185); --bgord: oklch(87% .08 185);
  --csel: oklch(26% .14 250); --bgsel: oklch(87% .07 250);
  --ccor: oklch(30% .12  55); --bgcor: oklch(88% .08  55);
  --cdec: oklch(28% .14  30); --bgdec: oklch(88% .09  30);
  --cdsc: oklch(40% .006  0); --bgdsc: oklch(87% .008  0);

  --cess: oklch(30% .15  15); --bgess: oklch(88% .10  15);
  --cimp: oklch(30% .12  50); --bgimp: oklch(88% .08  50);

  color-scheme: light;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--t);
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 60% at  10%  5%, oklch(87% .09  65 / .72) 0%, transparent 62%),
    radial-gradient(ellipse 60% 80% at  83% 20%, oklch(84% .06 320 / .58) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at  45% 85%, oklch(88% .07 140 / .48) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at  90% 90%, oklch(86% .08  40 / .48) 0%, transparent 55%),
    oklch(93% .013 72);
  background-attachment: fixed;
}

#auth-overlay {
  position: fixed; inset: 0;
  background: oklch(93% .013 72 / .55);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; padding: 1.5rem;
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: var(--card-shadow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 2.5rem 2rem;
  width: 100%; max-width: 320px;
  text-align: center;
}
.auth-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--t3); margin-bottom: 10px; }
.auth-title { font-family: var(--font-display); font-size: 24px; font-weight: 400; font-style: italic; letter-spacing: -.01em; margin-bottom: 6px; color: var(--t); }
.auth-sub { font-size: 13px; color: var(--t2); margin-bottom: 1.5rem; }
.auth-input { width: 100%; font-family: var(--mono); font-size: 15px; padding: 10px 14px; border: 1px solid var(--border2); border-radius: 10px; outline: none; text-align: center; letter-spacing: .15em; color: var(--t); background: oklch(100% 0 0 / .55); margin-bottom: 8px; transition: border-color .15s; }
.auth-input:focus { border-color: var(--accent); }
.auth-error { font-size: 12px; color: var(--accent); margin-bottom: 10px; display: none; }
.auth-btn { width: 100%; font-family: var(--font); font-size: 13px; font-weight: 500; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: opacity .15s; }
.auth-btn:hover { opacity: .88; }

#main-app { display: none; }
.app { max-width: 900px; margin: 0 auto; padding: clamp(1rem,4vw,2rem); }

.hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; }
.hdr-left h1 { font-family: var(--font-display); font-size: clamp(22px,5vw,32px); font-weight: 400; font-style: italic; letter-spacing: -.01em; line-height: 1.15; color: var(--t); text-wrap: balance; }
.hdr-left p { font-size: 11px; color: var(--t3); margin-top: 4px; font-family: var(--mono); }
.hdr-dot { width: 8px; height: 8px; border-radius: 50%; background: oklch(62% .17 150); margin-top: 8px; flex-shrink: 0; box-shadow: 0 0 0 3px oklch(62% .17 150 / .2); animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px oklch(62% .17 150 / .2); } 50% { box-shadow: 0 0 0 7px oklch(62% .17 150 / .06); } }

.stops-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 1rem 1.25rem; margin-bottom: 1.25rem; overflow: hidden; }
.stops-label { font-size: 10px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); margin-bottom: .75rem; }
.stops-scroll { overflow-x: auto; padding-bottom: .5rem; -webkit-overflow-scrolling: touch; }
.stops-scroll::-webkit-scrollbar { height: 3px; }
.stops-scroll::-webkit-scrollbar-track { background: transparent; }
.stops-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.stops-track { display: flex; align-items: flex-start; gap: 0; min-width: max-content; position: relative; padding-top: 28px; }
.stop { display: flex; flex-direction: column; align-items: center; min-width: 90px; position: relative; }
.stop-line { position: absolute; top: 10px; left: 50%; right: -50%; height: 2px; z-index: 0; }
.stop:last-child .stop-line { display: none; }
.stop-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border2); background: oklch(100% 0 0 / .7); z-index: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; position: relative; transition: all .3s; }
.stop-dot.done  { background: var(--t); border-color: var(--t); color: oklch(93% .013 72); }
.stop-dot.today { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent) / .15; }
.stop-dot.next  { background: oklch(100% 0 0 / .7); border-color: var(--csel); color: var(--csel); }
.stop-meta { margin-top: 6px; text-align: center; }
.stop-date { font-family: var(--mono); font-size: 9px; color: var(--t3); }
.stop-name { font-size: 10px; font-weight: 500; color: var(--t2); max-width: 80px; text-align: center; line-height: 1.3; margin-top: 1px; }
.stop-dot.done+.stop-meta .stop-name { color: var(--t3); }
.stop-dot.today+.stop-meta .stop-name, .stop-dot.today+.stop-meta .stop-date { color: var(--accent); font-weight: 600; }

.week-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.week-tabs { display: flex; gap: 6px; margin-bottom: .875rem; }
.wtab { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font); font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: none; color: var(--t2); cursor: pointer; transition: all .15s; }
.wtab:hover { border-color: var(--accent-t); color: var(--t); }
.wtab.active { background: var(--accent-bg); color: var(--accent-t); border-color: oklch(50% .19 28 / .3); }
.wcnt { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 8px; }
.wtab.active .wcnt     { background: oklch(50% .19 28 / .15); color: var(--accent); }
.wtab:not(.active) .wcnt { background: oklch(88% .09 30); color: oklch(28% .14 30); }
.arow { display: flex; gap: 10px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border2); }
.arow:last-child { border: none; }
.adate { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); min-width: 95px; padding-top: 1px; }
.atitle { font-size: 12px; color: var(--t); }
.brow { display: flex; gap: 8px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid var(--border2); }
.brow:last-child { border: none; }
.bbadge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; background: oklch(88% .09 30); color: oklch(28% .14 30); white-space: nowrap; flex-shrink: 0; }
.bnote { font-size: 11px; color: var(--t3); display: block; margin-top: 1px; }

.metrics { display: grid; grid-template-columns: repeat(auto-fit,minmax(120px,1fr)); gap: 8px; margin-bottom: 1.25rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 14px 16px; transition: border-color .2s; }
.metric:hover { border-color: oklch(100% 0 0 / .72); }
.mlabel { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--t3); margin-bottom: 6px; }
.mval   { font-size: 24px; font-weight: 500; letter-spacing: -.02em; font-family: var(--mono); }

.nav-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 4px; display: flex; gap: 2px; margin-bottom: 1.25rem; overflow-x: auto; flex-shrink: 0; }
.nav-wrap::-webkit-scrollbar { display: none; }
nav button { background: none; border: none; padding: 7px 13px; font-family: var(--font); font-size: 12px; font-weight: 500; color: var(--t2); cursor: pointer; border-radius: 10px; white-space: nowrap; transition: all .15s; }
nav button:hover { color: var(--t); background: var(--surface2); }
nav button.active { background: var(--accent-bg); color: var(--accent-t); border: 1px solid oklch(50% .19 28 / .25); }

.badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; letter-spacing: .01em; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.urgente-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 10px; background: var(--accent); color: #fff; white-space: nowrap; flex-shrink: 0; letter-spacing: .02em; }

.tgrid { display: grid; grid-template-columns: repeat(auto-fill,minmax(min(100%,260px),1fr)); gap: 10px; }
.tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 14px; transition: border-color .2s, box-shadow .2s; }
.tile:hover { border-color: oklch(100% 0 0 / .72); box-shadow: 0 12px 40px oklch(20% .05 60 / .1), 0 3px 10px oklch(20% .05 60 / .07), inset 0 1px 0 oklch(100% 0 0 / .65); }
.thead { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.tname { font-family: var(--font-display); font-size: 14px; font-weight: 400; font-style: italic; letter-spacing: -.005em; flex: 1; color: var(--t); }
.tpbar   { height: 3px; background: oklch(100% 0 0 / .3); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
.tpfill  { height: 3px; border-radius: 2px; transition: width .6s cubic-bezier(.16,1,.3,1); }
.tstat   { display: flex; justify-content: space-between; margin-bottom: 10px; }
.tstat span { font-size: 11px; color: var(--t2); font-family: var(--mono); }
.tsub { font-size: 9px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); margin: 8px 0 5px; }
.titem { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; margin-bottom: 4px; }

.rcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); padding: 14px 16px; margin-bottom: 8px; transition: border-color .2s; }
.rcard:hover { border-color: oklch(100% 0 0 / .72); }
.rhead { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.rname { font-family: var(--font-display); font-size: 15px; font-weight: 400; font-style: italic; letter-spacing: -.005em; flex: 1; color: var(--t); }
.rpbar { height: 3px; background: oklch(100% 0 0 / .3); border-radius: 2px; width: 60px; overflow: hidden; flex-shrink: 0; }
.sub { font-size: 9px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); margin: 8px 0 5px; }
.irow { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border2); }
.irow:last-child { border: none; }
.itext { flex: 1; min-width: 0; font-size: 12px; color: var(--t); }
.inote { font-size: 11px; color: var(--t3); margin-left: 4px; }

.oroom { font-size: 9px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t3); margin: 16px 0 6px; }
.orow { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); margin-bottom: 4px; transition: border-color .15s; }
.orow:hover { border-color: oklch(100% 0 0 / .72); }
.oname { flex: 1; font-size: 13px; color: var(--t); }

.tl-outer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--card-shadow); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); overflow: hidden; }
.tl-scroll-bar-wrap { height: 3px; background: oklch(100% 0 0 / .25); }
.tl-scroll-bar-fill { height: 3px; background: var(--accent); border-radius: 0; width: 0%; transition: width .1s; }
.tl-container { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 1rem; }
.tl-container::-webkit-scrollbar { height: 0; }
.tlcath { display: flex; align-items: center; gap: 7px; margin: 12px 0 4px; font-size: 9px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--t2); }
.tlrow { display: flex; align-items: flex-start; margin-bottom: 2px; }
.tllbl { text-align: right; padding-right: 10px; padding-top: 4px; font-size: 11px; color: var(--t2); line-height: 1.3; flex-shrink: 0; }
.tltrack { position: relative; flex-shrink: 0; }
.tlbar { position: absolute; top: 3px; height: 20px; border-radius: 5px; display: flex; align-items: center; padding: 0 7px; font-family: var(--mono); font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; }
.tlnote { position: absolute; top: 27px; font-size: 10px; color: var(--t3); white-space: nowrap; }
.tlgrid { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border2); }
.tltoday { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); opacity: .5; }
.tlwrow { display: flex; margin-bottom: 4px; flex-shrink: 0; }

.tl-fs-overlay { position: fixed; inset: 0; background: oklch(93% .013 72 / .8); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); z-index: 2000; display: flex; flex-direction: column; overflow: hidden; }
.tl-fs-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border2); flex-shrink: 0; background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
.tl-fs-title { font-family: var(--font-display); font-size: 16px; font-weight: 400; font-style: italic; letter-spacing: -.01em; color: var(--t); }
.tl-fs-hint { font-size: 11px; color: var(--t3); font-family: var(--mono); }
.tl-fs-close { font-family: var(--font); font-size: 12px; font-weight: 500; padding: 6px 14px; border: 1px solid var(--border2); border-radius: 10px; background: oklch(100% 0 0 / .55); color: var(--t); cursor: pointer; transition: all .15s; }
.tl-fs-close:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.tl-fs-body { flex: 1; overflow: hidden; padding: 1rem 1.25rem; position: relative; }
.tl-fs-legend { padding: 10px 20px 14px; border-top: 1px solid var(--border2); flex-shrink: 0; background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; flex-wrap: wrap; gap: 10px; font-size: 11px; color: var(--t2); }
.tl-grab { cursor: grab; user-select: none; -webkit-user-select: none; }
.tl-grab.grabbing { cursor: grabbing; }
.tl-fs-btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font); font-size: 11px; font-weight: 500; padding: 5px 12px; border: 1px solid var(--border2); border-radius: 10px; background: var(--surface); color: var(--t2); cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); transition: all .15s; margin-bottom: .875rem; }
.tl-fs-btn:hover { border-color: var(--accent); color: var(--accent); }
.tl-fs-btn svg { flex-shrink: 0; }

.lfilters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
.lfilters select { font-family: var(--font); font-size: 12px; padding: 6px 10px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--t); cursor: pointer; outline: none; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.lfilters select:focus { border-color: var(--accent); }
.lrow { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 9px; }
.lrow:nth-child(odd) { background: oklch(100% 0 0 / .45); }
.larea { font-size: 11px; color: var(--t3); white-space: nowrap; font-family: var(--mono); }

.logentry { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border2); align-items: flex-start; }
.logentry:last-child { border: none; }
.logdate { font-family: var(--mono); font-size: 11px; color: var(--t3); min-width: 90px; padding-top: 1px; }
.logtext { font-size: 13px; color: var(--t); }
.logform { margin-top: 1.25rem; display: flex; gap: 8px; flex-wrap: wrap; }

  "da-scegliere":{label:"Da scegliere",c:"var(--cdsc)",bg:"var(--bgdsc)"},
};
const PC={
  essenziale:{label:"Essenziale",c:"var(--cess)",bg:"var(--bgess)"},
  importante:{label:"Importante", c:"var(--cimp)",bg:"var(--bgimp)"},
};
const PRIO=["essenziale","importante","procrastinabile"];

function badge(l,c,bg){return `<span class="badge" style="color:${c};background:${bg}">${l}</span>`;}
function sBadge(s){const c=SC[s]||SC["da-scegliere"];return badge(c.label,c.c,c.bg);}
function pBadge(p){const c=PC[p];return c?badge(c.label,c.c,c.bg):"";}
function sDot(s,mt){const c=SC[s]||SC["da-scegliere"];return `<span class="dot" style="background:${c.c};margin-top:${mt==null?4:mt}px"></span>`;}
function prog(r){
  const tot=r.items.length;
  const done=r.items.filter(i=>["acquistato","ordinato"].includes(i.s)).length;
  const adv=r.items.filter(i=>["scelto","in-corso"].includes(i.s)).length;
  return{tot,done,adv,pct:Math.round((done+adv*.5)/tot*100)};
}

function renderNextStops(){
  const now=new Date();
  const stops=DATA.nextStops;
  let html="";
  stops.forEach((stop,i)=>{
    const d=new Date(stop.date);
    const isPast=d<now && !(d.toDateString()===now.toDateString());
    const isToday=d.toDateString()===now.toDateString();
    const isNext=!isPast&&!isToday&&(i===stops.findIndex(s=>new Date(s.date)>=now));
    const dotClass=isPast?"done":isToday?"today":isNext?"next":"";
    const lineColor=isPast?"var(--t2)":"var(--border2)";
    const mo=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
    const dd=d.getDate();const mm=mo[d.getMonth()];
    const icon=isPast?"✓":isToday?"●":"";
    html+=`<div class="stop">
      <div class="stop-line" style="background:${lineColor}"></div>
      <div class="stop-dot ${dotClass}">${icon}</div>
      <div class="stop-meta">
        <div class="stop-date">${dd} ${mm}</div>
        <div class="stop-name">${stop.label}</div>
      </div>
    </div>`;
  });
  document.getElementById("next-stops").innerHTML=html;
}

function parseApptDate(when){
  const mo={gen:0,feb:1,mar:2,apr:3,mag:4,giu:5,lug:6,ago:7,set:8,ott:9,nov:10,dic:11};
  const p=when.split(' ');const t=(p[4]||"0:0").split(':');
  return new Date(2026,mo[p[2]],parseInt(p[1]),parseInt(t[0]),parseInt(t[1]));
}
function switchWeekTab(id,btn){
  document.getElementById("week-appts").style.display=id==="appts"?"block":"none";
  document.getElementById("week-blocks").style.display=id==="blocks"?"block":"none";
  document.querySelectorAll(".wtab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
function renderWeek(){
  document.getElementById("meta-date").textContent=DATA.meta.lastUpdate;

  const future=DATA.meta.appointments.filter(a=>parseApptDate(a.when)>now);

    :`<div style="font-size:12px;color:var(--t3);padding:6px 0">Nessuna urgenza</div>`;
}

function renderMetrics(){
  const all=DATA.rooms.flatMap(r=>r.items);
  const acq=all.filter(i=>["acquistato","ordinato"].includes(i.s)).length;
  const ess=DATA.rooms.filter(r=>r.priority==="essenziale").flatMap(r=>r.items);
  const essOk=ess.filter(i=>["acquistato","ordinato","scelto","in-corso"].includes(i.s)).length;
  const toOrd=all.filter(i=>i.s==="scelto").length;
  const urgent=all.filter(i=>i.blockBy).length;
  document.getElementById("metrics").innerHTML=[
    {label:"Acquistati/ordinati",val:acq,    c:"oklch(30% .12 150)"},
    {label:"Essenziali ok",      val:`${essOk}/${ess.length}`,c:"oklch(30% .12 55)"},
    {label:"Da ordinare ora",    val:toOrd,   c:"oklch(26% .14 250)"},
    {label:"Urgenti",            val:urgent,  c:"var(--accent)"},
  ].map(m=>`<div class="metric"><div class="mlabel">${m.label}</div><div class="mval" style="color:${m.c}">${m.val}</div></div>`).join("");
}

function renderTiles(){
  const sorted=[...DATA.rooms].sort((a,b)=>PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority));
  let h=`<div class="tgrid">`;
  sorted.forEach(r=>{
    const p=prog(r);
    const bord={essenziale:"oklch(50% .19 28)",importante:"oklch(50% .19 50)"}[r.priority]||"transparent";
    const done=r.items.filter(i=>["acquistato","ordinato"].includes(i.s));
    const inP=r.items.filter(i=>["scelto","in-corso","da-decidere"].includes(i.s));
    const pend=r.items.filter(i=>i.s==="da-scegliere");
    const fill=p.done===p.tot?"oklch(30% .12 150)":"oklch(50% .19 28)";
    h+=`<div class="tile" style="border-top:2px solid ${bord}">
      <div class="thead"><span class="tname">${r.name}</span>${pBadge(r.priority)}</div>
      <div class="tpbar"><div class="tpfill" style="width:${p.pct}%;background:${fill}"></div></div>
      <div class="tstat"><span>${done.length} ok · ${inP.length} in corso</span><span>${pend.length} da scegliere</span></div>`;
    if(r.lavori?.length){
      h+=`<div class="tsub">Lavori</div>`;
      r.lavori.slice(0,2).forEach(l=>h+=`<div class="titem"><span class="dot" style="background:oklch(45% .14 150);margin-top:4px"></span><span style="color:var(--t2)">${l}</span></div>`);
    }
    if(inP.length||pend.length){
      h+=`<div class="tsub">Acquisti</div>`;
      [...inP,...pend].forEach(i=>{
        const tag=i.blockBy?`<span class="urgente-tag">urgente</span>`:"";
        h+=`<div class="titem">${sDot(i.s)}<span style="flex:1">${i.n}</span>${tag}</div>`;
      });
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById("tab-tiles").innerHTML=h;
}

function renderStanze(){
  const sorted=[...DATA.rooms].sort((a,b)=>PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority));
  let h="";
  sorted.forEach(r=>{
    const p=prog(r);
    const fill=p.done===p.tot?"oklch(30% .12 150)":"oklch(50% .19 28)";
    h+=`<div class="rcard">
      <div class="rhead"><span class="rname">${r.name}</span>${pBadge(r.priority)}<span style="font-size:11px;color:var(--t2);font-family:var(--mono)">${p.done}/${p.tot}</span><div class="rpbar"><div style="height:3px;border-radius:2px;width:${p.pct}%;background:${fill}"></div></div></div>`;
    if(r.lavori?.length){
      h+=`<div class="sub">Lavori impresa</div>`;

    }

    r.items.forEach(i=>h+=`<div class="irow">${sDot(i.s)}<span class="itext">${i.n}${i.note?`<span class="inote">${i.note}</span>`:""}</span>${i.blockBy?`<span class="urgente-tag" style="margin-left:auto">urgente</span>`:""} ${sBadge(i.s)}</div>`);

function buildTimelineInner(T,LW,CHART_W){
  const tS=new Date(2026,4,11);
  function dAt(n){const d=new Date(tS);d.setDate(d.getDate()+n);return `${d.getDate()}/${d.getMonth()+1}`;}
  let inner=`<div style="width:${CHART_W}px">`;
  inner+=`<div class="tlwrow" style="margin-left:${LW}px">`;
  for(let w=0;w*7<=T;w++) inner+=`<div style="flex:7;min-width:${(7/T*(CHART_W-LW)).toFixed(0)}px;font-size:10px;color:var(--t3);font-family:var(--mono)">${dAt(w*7)}</div>`;
  inner+=`</div>`;
  const tS0=new Date(2026,4,11);
  const nowD=new Date();
  const todayOffset=Math.max(0,(nowD-tS0)/(1000*60*60*24));
  DATA.timeline.categories.forEach(cat=>{
    inner+=`<div class="tlcath" style="margin-left:${LW}px"><span style="width:8px;height:8px;border-radius:2px;background:${cat.color};flex-shrink:0"></span>${cat.label}</div>`;
    cat.phases.forEach(p=>{
      const bc=p.dim?"oklch(80% .01 70)":cat.color,tc=p.dim?"oklch(50% .01 70)":cat.textColor;
      const ph=p.note?42:28;
      const trackW=CHART_W-LW;
      const grids=Array.from({length:16},(_,w)=>w*7<=T?`<div class="tlgrid" style="left:${(w*7/T*100).toFixed(1)}%"></div>`:"").join("");
      const todayLine=`<div class="tltoday" style="left:${(todayOffset/T*100).toFixed(1)}%"></div>`;
      inner+=`<div class="tlrow"><div class="tllbl" style="width:${LW}px;min-width:${LW}px">${p.label}</div><div class="tltrack" style="width:${trackW}px;height:${ph}px;flex-shrink:0">${grids}${todayLine}<div class="tlbar" style="left:${(p.s/T*100).toFixed(1)}%;width:${(p.d/T*100).toFixed(1)}%;background:${bc};color:${tc}">${p.d}g</div>${p.note?`<div class="tlnote" style="left:${(p.s/T*100).toFixed(1)}%">${p.note}</div>`:""}</div></div>`;
    });
  });
  inner+=`</div>`;
  return inner;
}

function addDragPan(el){
  el.classList.add("tl-grab");
  let isDown=false,startX=0,startScroll=0;
  el.addEventListener("mousedown",e=>{isDown=true;startX=e.pageX;startScroll=el.scrollLeft;el.classList.add("grabbing");e.preventDefault();});
  document.addEventListener("mouseup",()=>{isDown=false;el.classList.remove("grabbing");});
  el.addEventListener("mousemove",e=>{if(!isDown)return;el.scrollLeft=startScroll-(e.pageX-startX);});
  el.addEventListener("mouseleave",()=>{isDown=false;el.classList.remove("grabbing");});
}

function openTimelineFullscreen(){
  const T=DATA.timeline.totalDays,LW=190;
  const CHART_W=Math.max(1500,LW+T*17);
  const legendHtml=DATA.timeline.categories.map(c=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${c.color}"></span>${c.label}</span>`).join("");
  const inner=buildTimelineInner(T,LW,CHART_W);
  const overlay=document.createElement("div");
  overlay.className="tl-fs-overlay";overlay.id="tl-fs-overlay";
  overlay.innerHTML=`
    <div class="tl-fs-header">
      <div><div class="tl-fs-title">Timeline — Casa Mantellate</div><div class="tl-fs-hint">Trascina per navigare · scorri orizzontalmente</div></div>
      <button class="tl-fs-close" onclick="document.getElementById('tl-fs-overlay').remove();document.body.style.overflow=''">✕ Chiudi</button>
    </div>
    <div class="tl-fs-body">
      <div class="tl-outer" style="height:100%;display:flex;flex-direction:column">
        <div class="tl-scroll-bar-wrap"><div class="tl-scroll-bar-fill" id="tl-fs-fill"></div></div>
        <div class="tl-container tl-grab" id="tl-fs-scroll" style="flex:1;overflow-x:auto;overflow-y:auto">${inner}</div>
      </div>
    </div>
    <div class="tl-fs-legend">${legendHtml}</div>`;
  document.body.appendChild(overlay);document.body.style.overflow="hidden";
  const sc=document.getElementById("tl-fs-scroll");
  const fill=document.getElementById("tl-fs-fill");
  sc.addEventListener("scroll",()=>{fill.style.width=Math.min(100,sc.scrollLeft/(sc.scrollWidth-sc.clientWidth)*100).toFixed(1)+"%";});
  addDragPan(sc);
  const esc=(e)=>{if(e.key==="Escape"){overlay.remove();document.body.style.overflow="";document.removeEventListener("keydown",esc);}};
  document.addEventListener("keydown",esc);
}

function renderTimeline(){
  const T=DATA.timeline.totalDays,LW=190;
  const CHART_W=Math.max(800,LW+T*11);
  const inner=buildTimelineInner(T,LW,CHART_W);
  const legendHtml=`<div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--t2)">${DATA.timeline.categories.map(c=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${c.color}"></span>${c.label}</span>`).join("")}</div>`;
  document.getElementById("tab-timeline").innerHTML=`
    <button class="tl-fs-btn" onclick="openTimelineFullscreen()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4.5V1.5H4M9 1.5h3V4.5M12 8.5v3H9M4 11.5H1V8.5"/></svg>
      Apri a tutto schermo
    </button>
    <div class="tl-outer">
      <div class="tl-scroll-bar-wrap"><div class="tl-scroll-bar-fill" id="tl-fill"></div></div>
      <div class="tl-container" id="tl-scroll">${inner}</div>
    </div>${legendHtml}`;
  const sc=document.getElementById("tl-scroll");
  const fill=document.getElementById("tl-fill");
  sc.addEventListener("scroll",()=>{fill.style.width=Math.min(100,sc.scrollLeft/(sc.scrollWidth-sc.clientWidth)*100).toFixed(1)+"%";});
  addDragPan(sc);
}

function renderOrdina(){
  const byRoom=DATA.rooms.map(r=>({name:r.name,items:r.items.filter(i=>i.s==="scelto")})).filter(r=>r.items.length);
  const tot=byRoom.reduce((s,r)=>s+r.items.length,0);
  let h=`<p style="font-size:13px;color:var(--t2);margin-bottom:1.25rem">Già scelti, in attesa di essere ordinati — <strong style="color:var(--t);font-family:var(--mono)">${tot}</strong> voci.</p>`;
  byRoom.forEach(r=>{
    h+=`<div class="oroom">${r.name}</div>`;
    r.items.forEach(i=>h+=`<div class="orow">${sDot("scelto",0)}<span class="oname">${i.n}${i.note?` <span style="font-size:11px;color:var(--t3)">(${i.note})</span>`:""}</span>${i.blockBy?`<span class="urgente-tag">urgente</span>`:""}<span class="badge" style="color:var(--csel);background:var(--bgsel)">Scelto</span></div>`);
  });
  document.getElementById("tab-ordina").innerHTML=h;
}

let lf={area:"Tutte",stato:"Tutti"};
const allItems=DATA.rooms.flatMap(r=>r.items.map(i=>({...i,area:r.name})));
function renderLista(){
  const areas=["Tutte",...new Set(allItems.map(i=>i.area))];
  const stati=["Tutti",...Object.keys(SC)];

  document.getElementById("tab-lista").innerHTML=h;
}

function renderLog(){
  let h=`<div style="margin-bottom:1.25rem">${[...DATA.log].reverse().map(e=>`<div class="logentry"><span class="logdate">${e.date}</span><span class="logtext">${e.text}</span></div>`).join("")}</div>`;
  h+=`<div class="logform"><input id="log-input" type="text" placeholder="Aggiungi un aggiornamento..."><button onclick="addLog()">Aggiungi</button></div><p style="font-size:11px;color:var(--t3);margin-top:8px">Voci temporanee — per salvarle aggiorna DATA.log con Claude.</p>`;
  document.getElementById("tab-log").innerHTML=h;
}
function addLog(){
  const inp=document.getElementById("log-input");
  if(!inp?.value.trim())return;
  const d=new Date();
  DATA.log.push({date:`${d.getDate()} ${["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"][d.getMonth()]} ${d.getFullYear()}`,text:inp.value.trim()});
  renderLog();
}

function showTab(id,btn){
  ["tiles","stanze","timeline","ordina","lista","log"].forEach(t=>document.getElementById("tab-"+t).style.display=t===id?"block":"none");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

const AUTH_PASS="mantellate2026";
const AUTH_COOKIE="cm_auth_v1";
const AUTH_DAYS=180;
function getCookie(n){const v=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');return v?v.pop():'';}
function setCookie(n,v,d){const x=new Date();x.setTime(x.getTime()+d*864e5);document.cookie=`${n}=${v};expires=${x.toUTCString()};path=/`;}
function tryLogin(){
  const v=document.getElementById("pass-input").value;
  if(v===AUTH_PASS){
    setCookie(AUTH_COOKIE,"ok",AUTH_DAYS);
    document.getElementById("auth-overlay").style.display="none";
    document.getElementById("main-app").style.display="block";
  } else {
    document.getElementById("pass-error").style.display="block";
    document.getElementById("pass-input").value="";
    document.getElementById("pass-input").focus();
  }
}
if(getCookie(AUTH_COOKIE)==="ok"){
  document.getElementById("auth-overlay").style.display="none";
  document.getElementById("main-app").style.display="block";
}

renderNextStops();renderWeek();renderMetrics();
renderTiles();renderStanze();renderTimeline();
renderOrdina();renderLista();renderLog();
</script>
